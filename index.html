                        </div>
                        <div class="px-6 py-4 pb-safe bg-slate-50 flex justify-end gap-3 border-t border-slate-100 shrink-0">
                            <button onclick="state.modals.score.visible = false; app.refreshData(true);" class="px-5 py-3 sm:py-2.5 text-slate-600 hover:bg-slate-200 rounded-xl text-sm font-bold transition flex-1 sm:flex-none">${t('btn_cancel')}</button>
                            <button onclick="app.submitScore()" ${state.isSubmitting ? 'disabled' : ''} class="px-6 py-3 sm:py-2.5 bg-indigo-600 text-white rounded-xl hover:bg-indigo-700 text-sm font-bold shadow-md active:scale-95 transition disabled:opacity-50 flex items-center justify-center flex-1 sm:flex-none">
                                ${state.isSubmitting ? '<i class="fas fa-spinner fa-spin mr-2"></i>' : ''} ${t('btn_confirm')}
                            </button>
                        </div>
                    </div>
                </div>
            `;
        };

        const renderEditCategoryModal = () => {
            const m = state.modals.editCategory;
            if (!m.visible) return '';

            return `
                <div class="fixed inset-0 z-[140] flex items-end sm:items-center justify-center bg-slate-900/60 backdrop-blur-sm no-print p-0 sm:p-4">
                    <div class="bg-white rounded-t-3xl sm:rounded-3xl shadow-2xl w-full max-w-sm overflow-hidden transform transition-all mt-auto sm:mt-0 mb-0 sm:mb-auto flex flex-col max-h-[90vh]">
                        <div class="bg-indigo-600 px-6 py-5 flex justify-between items-center text-white sticky top-0 z-10 shrink-0">
                            <h3 class="font-bold text-lg font-kai tracking-wide"><i class="fas fa-edit mr-2"></i>${t('modal_edit_title')}</h3>
                            <button onclick="state.modals.editCategory.visible = false; app.refreshData(true);" class="p-1 -mr-2 text-indigo-200 hover:text-white transition"><i class="fas fa-times text-lg"></i></button>
                        </div>
                        <div class="p-6 space-y-5 overflow-y-auto shrink-0">
                            <div>
                                <label class="block text-sm font-bold text-slate-700 mb-1.5">${t('ph_item_name')} <span class="text-rose-500">*</span></label>
                                <input type="text" oninput="state.modals.editCategory.newName = this.value" value="${m.newName}" class="w-full border-2 border-slate-200 rounded-xl px-4 py-2.5 outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 font-bold text-lg transition">
                            </div>
                            <div>
                                <label class="block text-sm font-bold text-slate-700 mb-1.5">${t('label_organizer')}</label>
                                <input type="text" oninput="state.modals.editCategory.organizer = this.value" value="${m.organizer}" class="w-full border-2 border-slate-200 rounded-xl px-4 py-2.5 outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 font-medium transition">
                            </div>
                            <div class="flex gap-4 w-full">
                                <div class="flex-1 w-1/2"><label class="block text-sm font-bold text-slate-700 mb-1.5">${t('label_start_date')}</label><input type="date" oninput="state.modals.editCategory.startDate = this.value" value="${m.startDate}" class="w-full border-2 border-slate-200 rounded-xl px-3 py-2.5 outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 text-sm font-medium transition"></div>
                                <div class="flex-1 w-1/2"><label class="block text-sm font-bold text-slate-700 mb-1.5">${t('label_end_date')}</label><input type="date" oninput="state.modals.editCategory.endDate = this.value" value="${m.endDate}" class="w-full border-2 border-slate-200 rounded-xl px-3 py-2.5 outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 text-sm font-medium transition"></div>
                            </div>
                            <div class="bg-indigo-50 p-4 rounded-xl text-xs sm:text-sm text-indigo-800 border border-indigo-100 leading-relaxed font-medium shadow-sm"><i class="fas fa-info-circle mr-1.5 text-indigo-600"></i> ${t('hint_edit_sync')}</div>
                        </div>
                        <div class="px-6 py-4 pb-safe bg-slate-50 flex justify-end gap-3 border-t border-slate-100 shrink-0">
                            <button onclick="state.modals.editCategory.visible = false; app.refreshData(true);" class="px-5 py-3 sm:py-2.5 text-slate-600 hover:bg-slate-200 rounded-xl text-sm font-bold transition flex-1 sm:flex-none">${t('btn_cancel')}</button>
                            <button onclick="app.submitEditCategory()" ${state.isSubmitting ? 'disabled' : ''} class="px-6 py-3 sm:py-2.5 bg-indigo-600 text-white rounded-xl hover:bg-indigo-700 text-sm font-bold shadow-md active:scale-95 transition disabled:opacity-50 flex items-center justify-center flex-1 sm:flex-none">
                                ${state.isSubmitting ? '<i class="fas fa-spinner fa-spin mr-2"></i>' : ''} ${t('btn_save')}
                            </button>
                        </div>
                    </div>
                </div>
            `;
        };

        const renderPosterModal = () => {
            const m = state.modals.poster;
            if (!m.visible) return '';

            const getRankEmoji = (rank) => {
                if (!rank) return '';
                if (rank.includes('冠') || rank === 'Champion' || rank === 'Johan') return '🏆';
                if (rank.includes('亚') || rank === '1st Runner-up' || rank === 'Naib Johan') return '🥈';
                if (rank.includes('季') || rank === '2nd Runner-up' || rank === 'Ketiga') return '🥉';
                if (rank.includes('特优') || rank === 'Distinction' || rank === 'Cemerlang') return '🌟';
                return '🏅';
            };

            const getRankGradient = (rank) => {
                if (!rank) return 'bg-indigo-50 text-indigo-700 border-indigo-200';
                if (rank.includes('冠') || rank === 'Champion' || rank === 'Johan') return 'bg-gradient-to-r from-yellow-200 to-amber-400 text-yellow-900 border-yellow-300';
                if (rank.includes('亚') || rank === '1st Runner-up' || rank === 'Naib Johan') return 'bg-gradient-to-r from-slate-200 to-slate-400 text-slate-800 border-slate-300';
                if (rank.includes('季') || rank === '2nd Runner-up' || rank === 'Ketiga') return 'bg-gradient-to-r from-orange-200 to-amber-500 text-orange-950 border-orange-300';
                return 'bg-indigo-50 text-indigo-700 border-indigo-200';
            };

            const renderWinnersCol = (colData) => {
                return colData.map(group => `
                    <div class="mb-5">
                        <div class="flex items-center mb-3">
                            <div class="h-[2px] bg-white/40 flex-grow rounded-l-full"></div>
                            <span class="mx-3 text-white font-bold text-lg drop-shadow-md tracking-wider">${group.translatedLabel}</span>
                            <div class="h-[2px] bg-white/40 flex-grow rounded-r-full"></div>
                        </div>
                        <div class="grid grid-cols-1 gap-2.5">
                            ${group.winners.map(stu => `
                                <div class="poster-card px-3.5 py-2.5 rounded-xl flex items-center justify-between transform transition hover:scale-105">
                                    <div class="flex items-center flex-grow min-w-0 pr-3">
                                        <div class="text-2xl mr-2.5 drop-shadow-sm">${getRankEmoji(stu.rank)}</div>
                                        <div class="min-w-0">
                                            <div class="text-slate-800 font-bold text-base leading-tight truncate">${formatName(stu.studentName)}</div>
                                            <div class="text-slate-500 text-[11px] mt-0.5 font-medium tracking-wide">${stu.className}</div>
                                        </div>
                                    </div>
                                    <div class="text-right flex-shrink-0">
                                        <span class="inline-block ${getRankGradient(stu.rank)} border px-2.5 py-1 rounded-full text-[10px] font-black tracking-wide shadow-sm whitespace-nowrap">${smartRank(stu.rank, state.selectedCategory)}</span>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `).join('');
            };

            const leftHTML = renderWinnersCol(m.left);
            const rightHTML = renderWinnersCol(m.right);
            const hasWinners = m.left.length > 0 || m.right.length > 0;

            return `
                <div class="fixed inset-0 z-[130] flex items-center justify-center bg-slate-900/80 backdrop-blur-sm sm:p-4 no-print">
                    <div class="bg-white sm:rounded-3xl shadow-2xl w-full h-full sm:h-auto max-w-[1000px] overflow-hidden flex flex-col max-h-full">
                        <div class="bg-slate-800 text-white px-6 py-4 flex justify-between items-center shrink-0">
                            <h3 class="font-bold text-lg font-kai tracking-wide"><i class="fas fa-image mr-2 text-indigo-400"></i>${t('poster_title')}</h3>
                            <button onclick="app.closePoster()" class="p-2 -mr-2 text-slate-400 hover:text-white transition"><i class="fas fa-times text-lg"></i></button>
                        </div>
                        
                        <div class="overflow-auto p-4 sm:p-6 flex-grow bg-slate-100 flex justify-start sm:justify-center items-start">
                            <div id="poster-container" class="poster-container min-w-[900px] w-[900px] p-8 pb-12 relative shadow-2xl rounded-2xl flex flex-col shrink-0 origin-top-left sm:origin-top overflow-hidden">
                                
                                <!-- 学术漂浮装饰 -->
                                <div class="absolute top-10 left-12 text-white/20 text-5xl transform -rotate-12">🎓</div>
                                <div class="absolute bottom-20 left-16 text-white/20 text-4xl transform rotate-12">📚</div>
                                <div class="absolute top-24 right-16 text-white/20 text-6xl transform rotate-45">🚀</div>
                                <div class="absolute bottom-16 right-20 text-white/20 text-5xl transform -rotate-12">💡</div>
                                <div class="absolute top-1/2 left-8 text-white/10 text-3xl">🌟</div>
                                <div class="absolute top-1/2 right-10 text-white/10 text-4xl">🎨</div>
                                
                                <div class="absolute top-0 left-0 w-40 h-40 border-t-8 border-l-8 border-white/30 rounded-tl-3xl m-4"></div>
                                <div class="absolute bottom-0 right-0 w-40 h-40 border-b-8 border-r-8 border-white/30 rounded-br-3xl m-4"></div>
                                
                                <div class="text-center mb-8 relative z-10">
                                    <div class="text-white/80 text-lg mb-1.5 tracking-[0.25em] font-bold uppercase drop-shadow">${t('school_name_line2')}</div>
                                    <h1 class="text-5xl font-black text-white mb-4 tracking-widest drop-shadow-lg" style="text-shadow: 0 4px 10px rgba(0,0,0,0.3);">${state.selectedCategory}</h1>
                                    <div class="inline-block bg-white/10 backdrop-blur-md border border-white/40 text-white px-8 py-2 rounded-full font-bold text-xl shadow-lg mt-1 tracking-wider">
                                        ${t('poster_subtitle')}
                                    </div>
                                </div>

                                <div class="flex-grow relative z-10 flex gap-6 items-start justify-center min-h-[300px] px-8">
                                    <div class="flex-1 flex flex-col">
                                        ${leftHTML}
                                    </div>
                                    
                                    ${(m.left.length && m.right.length) ? `<div class="w-[2px] bg-white/20 self-stretch rounded-full mx-2 shadow-sm"></div>` : ''}
                                    
                                    <div class="flex-1 flex flex-col">
                                        ${rightHTML}
                                    </div>
                                </div>
                                
                                ${!hasWinners ? `<div class="absolute inset-0 flex items-center justify-center text-white/50 text-2xl font-bold tracking-widest">${t('msg_no_winners')}</div>` : ''}
                                
                                <div class="absolute bottom-5 left-0 w-full text-center text-white/50 text-xs tracking-widest font-mono">
                                    ${t('school_name_line2')} · ${formatDate(new Date())}
                                </div>
                            </div>
                        </div>
                        <div class="px-6 py-4 pb-safe bg-slate-50 border-t border-slate-200 flex justify-end gap-3 shrink-0">
                            <button onclick="app.closePoster()" class="px-5 py-3 sm:py-2.5 text-slate-600 hover:bg-slate-200 rounded-xl font-bold transition flex-1 sm:flex-none">${t('btn_close')}</button>
                            <button onclick="app.downloadPoster()" ${state.isGeneratingPoster ? 'disabled' : ''} class="px-6 py-3 sm:py-2.5 bg-indigo-600 text-white rounded-xl hover:bg-indigo-700 shadow-md font-bold flex items-center justify-center disabled:opacity-50 transition active:scale-95 flex-1 sm:flex-none">
                                ${state.isGeneratingPoster ? '<i class="fas fa-spinner fa-spin mr-2"></i>正在生成...' : `<i class="fas fa-download mr-2"></i> ${t('btn_save_img')}`}
                            </button>
                        </div>
                    </div>
                </div>
            `;
        };

        const renderDialogModal = () => {
            const m = state.modals.dialog;
            if (!m.visible) return '';

            const isInputType = ['prompt', 'password'].includes(m.type);

            return `
                <div class="fixed inset-0 z-[160] flex items-end sm:items-center justify-center bg-slate-900/60 backdrop-blur-sm no-print p-0 sm:p-4">
                    <div class="bg-white rounded-t-3xl sm:rounded-3xl shadow-2xl w-full max-w-sm overflow-hidden transform transition-all mt-auto sm:mt-0 mb-0 sm:mb-auto flex flex-col max-h-[90vh]">
                        <div class="bg-indigo-600 px-6 py-5 flex justify-between items-center text-white shrink-0">
                            <h3 class="font-bold text-lg tracking-wide"><i class="${m.icon}"></i> ${m.title}</h3>
                            <button onclick="app.handleModalCancel()" class="p-1 -mr-2 text-indigo-200 hover:text-white transition"><i class="fas fa-times text-lg"></i></button>
                        </div>
                        <div class="p-6 overflow-y-auto shrink-0">
                            <p class="text-slate-700 mb-5 whitespace-pre-line font-medium leading-relaxed">${m.message}</p>
                            ${isInputType ? `<input type="${m.type === 'password' ? 'password' : 'text'}" id="modal-input" oninput="state.modals.dialog.inputValue=this.value" value="${m.inputValue || ''}" onkeyup="if(event.key==='Enter') app.handleModalConfirm()" class="w-full border-2 border-slate-200 rounded-xl px-4 py-3.5 outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 text-lg font-bold transition" placeholder="${m.placeholder}">` : ''}
                        </div>
                        ${m.showButtons ? `
                            <div class="px-6 py-4 pb-safe bg-slate-50 flex justify-end gap-3 border-t border-slate-100 shrink-0">
                                ${m.type !== 'alert' ? `<button onclick="app.handleModalCancel()" class="px-5 py-3 sm:py-2.5 text-slate-600 hover:bg-slate-200 rounded-xl text-sm font-bold transition flex-1 sm:flex-none">${t('btn_cancel')}</button>` : ''}
                                <button onclick="app.handleModalConfirm()" class="px-6 py-3 sm:py-2.5 bg-indigo-600 text-white rounded-xl hover:bg-indigo-700 text-sm font-bold shadow-md active:scale-95 transition flex items-center justify-center flex-1 sm:flex-none">${m.confirmText || t('btn_confirm')}</button>
                            </div>
                        ` : ''}
                    </div>
                </div>
            `;
        };

        const renderToast = () => {
            const t = state.toast;
            if (!t.visible) return '';

            return `
                <div class="fixed top-20 left-1/2 transform -translate-x-1/2 z-[200] px-6 py-3 rounded-full shadow-lg font-bold text-sm flex items-center transition-all duration-300 ${t.type === 'success' ? 'bg-emerald-500 text-white' : (t.type === 'warning' ? 'bg-amber-500 text-white' : 'bg-rose-500 text-white')} w-[90%] sm:w-auto max-w-sm justify-center">
                    <i class="${t.type === 'success' ? 'fas fa-check-circle' : (t.type === 'warning' ? 'fas fa-exclamation-triangle' : 'fas fa-exclamation-circle')} mr-2 text-lg"></i>
                    <span class="break-words">${t.message}</span>
                </div>
            `;
        };

        // --- 17. 最终主入口挂载生命周期 (Main LifeCycle Mounting) ---
        const onMounted = () => {
            initPWA();
            initLocalCache();
            fetchAllData();
            
            // 定时后台刷新 (每60秒)
            autoRefreshTimer = setInterval(() => { fetchAllData(true); }, 60000); 
        };

        // 统一全局接口，使 HTML 内 onclick 绑定 safe 运行
        window.app = {
            goToStudentRecords: () => { state.currentTab = 'student_records'; state.studentSearchQuery = ''; updateDOM(); },
            toggleStudentViewMode,
            changeStudentSort,
            copyStudentRecords,
            exportStudentRecordsToExcel,
            goHome,
            goToRegister,
            enterAdmin,
            exitCategory,
            toggleLang,
            changeYear,
            changeFilter,
            selectCategory,
            toggleScoreInput,
            startBatchEdit,
            cancelBatchEdit,
            undoBatchEdit,
            autoRankBatch,
            saveBatchEdit,
            syncTeamScore,
            syncTeamRank,
            focusNextBatchInput,
            addClassGroup,
            removeClassGroup,
            addStudentRow,
            removeStudentRow,
            changeRegClass,
            toggleTeamBundle,
            updateStudentSelection,
            submitForm,
            deleteRegistration,
            openScoreModal,
            submitScore,
            openEditCategory,
            submitEditCategory,
            toggleStatus,
            adminAddItem,
            adminDeleteItem,
            printRoster,
            printScoringSheet,
            printResults,
            exportToExcel,
            openPosterModal,
            downloadPoster,
            closePoster,
            handleModalConfirm,
            handleModalCancel,
            syncQueueData,
            refreshData: (background = false) => fetchAllData(background)
        };

        // 启动系统
        onMounted();
    </script>
</body>
</html>
